services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: prsntrr
      POSTGRES_PASSWORD: prsntrr
      POSTGRES_DB: prsntrr
    volumes:
      - prsntrr_pgdata:/var/lib/postgresql/data

volumes:
  prsntrr_pgdata:
